<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wiseplusgrow CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Sarabun',sans-serif;background:#f0f2f5;display:flex;height:100vh;overflow:hidden;}
.sidebar{width:60px;min-width:60px;background:#1e2a3a;display:flex;flex-direction:column;align-items:center;padding:12px 0;transition:width .25s;overflow:hidden;z-index:100;flex-shrink:0;}
.sidebar:hover{width:220px;}
.sidebar .brand{display:flex;align-items:center;gap:10px;color:#fff;font-size:18px;font-weight:700;padding:8px 16px 20px;width:100%;white-space:nowrap;overflow:hidden;}
.sidebar .brand span{opacity:0;transition:opacity .2s;font-size:15px;}
.sidebar:hover .brand span{opacity:1;}
.nav-item{display:flex;align-items:center;gap:12px;width:100%;padding:11px 18px;cursor:pointer;color:#8fa3b1;transition:all .2s;white-space:nowrap;overflow:hidden;border-left:3px solid transparent;}
.nav-item:hover{background:rgba(255,255,255,.07);color:#fff;}
.nav-item.active{background:rgba(74,144,226,.15);color:#4a90e2;border-left:3px solid #4a90e2;}
.nav-item .icon{font-size:18px;min-width:24px;text-align:center;}
.nav-item .label{opacity:0;transition:opacity .2s;font-size:13.5px;}
.sidebar:hover .nav-item .label{opacity:1;}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.topbar{background:#fff;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #e8edf2;flex-shrink:0;}
.topbar h2{font-size:18px;font-weight:600;color:#1e2a3a;}
.topbar-right{display:flex;gap:10px;align-items:center;}
.btn-primary{background:#4a90e2;color:#fff;border:none;padding:8px 18px;border-radius:7px;cursor:pointer;font-size:13.5px;font-family:'Sarabun',sans-serif;font-weight:500;display:flex;align-items:center;gap:6px;}
.btn-primary:hover{background:#3a7bd5;}
.btn-outline{background:#fff;color:#1e2a3a;border:1px solid #dde3ec;padding:7px 14px;border-radius:7px;cursor:pointer;font-size:13px;font-family:'Sarabun',sans-serif;display:flex;align-items:center;gap:6px;}
.content{flex:1;overflow-y:auto;padding:24px;}
.page{display:none;}
.page.active{display:block;}
.stat-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:22px;}
.stat-card{background:#fff;border-radius:12px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.stat-card .num{font-size:26px;font-weight:700;color:#1e2a3a;margin:6px 0;}
.stat-card .lbl{font-size:12px;color:#8fa3b1;}
.stat-card .sub{font-size:11.5px;margin-top:8px;}
.tag{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;}
.tag-blue{background:#e8f0fb;color:#4a90e2;}
.tag-green{background:#e6f9f0;color:#27ae60;}
.tag-orange{background:#fff3e6;color:#e67e22;}
.tag-red{background:#fdecea;color:#e74c3c;}
.dash-row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:22px;}
.card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.card h3{font-size:14px;font-weight:600;color:#1e2a3a;margin-bottom:16px;}
.goal-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;font-size:13px;}
.goal-row .glabel{flex:0 0 120px;color:#4a5568;}
.bar-bg{flex:1;height:8px;background:#eef1f5;border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;background:#4a90e2;}
.goal-row .gval{flex:0 0 80px;text-align:right;font-size:12px;color:#8fa3b1;}
.donut-wrap{display:flex;align-items:center;gap:20px;}
.donut{position:relative;width:110px;height:110px;}
.donut svg{transform:rotate(-90deg);}
.donut .center-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;font-size:11.5px;color:#4a5568;font-weight:600;}
.legend{display:flex;flex-direction:column;gap:8px;}
.legend-item{display:flex;align-items:center;gap:8px;font-size:12.5px;color:#4a5568;}
.legend-dot{width:10px;height:10px;border-radius:50%;}
.card-table{background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:22px;}
.card-table h3{font-size:14px;font-weight:600;color:#1e2a3a;margin-bottom:14px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;padding:9px 12px;color:#8fa3b1;font-weight:600;border-bottom:1px solid #eef1f5;font-size:12px;}
td{padding:10px 12px;border-bottom:1px solid #f5f7fa;color:#2d3748;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#fafbfc;}
.empty-row{text-align:center;color:#b0bec5;padding:24px;font-size:13px;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal-box{background:#fff;border-radius:14px;width:500px;max-width:95vw;max-height:85vh;overflow:auto;padding:28px;}
.modal-box h3{font-size:16px;font-weight:700;color:#1e2a3a;margin-bottom:22px;}
.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:13px;color:#4a5568;font-weight:500;margin-bottom:6px;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 12px;border:1px solid #dde3ec;border-radius:8px;font-family:'Sarabun',sans-serif;font-size:13.5px;outline:none;color:#2d3748;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#4a90e2;}
.form-group textarea{resize:vertical;min-height:80px;}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:22px;}
.btn-cancel{background:#f0f2f5;color:#4a5568;border:none;padding:9px 20px;border-radius:8px;cursor:pointer;font-family:'Sarabun',sans-serif;font-size:14px;}
.pipeline{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.pipe-col{background:#f5f7fa;border-radius:10px;padding:14px;}
.pipe-col h4{font-size:13px;font-weight:600;color:#4a5568;margin-bottom:12px;display:flex;justify-content:space-between;}
.pipe-card{background:#fff;border-radius:8px;padding:12px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.pipe-card .pname{font-size:13px;font-weight:600;color:#1e2a3a;}
.pipe-card .pmeta{font-size:12px;color:#8fa3b1;margin-top:4px;}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.page-title{font-size:16px;font-weight:700;color:#1e2a3a;}
.setting-section{background:#fff;border-radius:12px;padding:22px;margin-bottom:18px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.setting-section h3{font-size:14px;font-weight:600;margin-bottom:16px;color:#1e2a3a;}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f5f7fa;}
.setting-row:last-child{border-bottom:none;}
.setting-label{font-size:13.5px;color:#2d3748;}
.setting-val{font-size:13px;color:#8fa3b1;}
.forecast-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:22px;}
</style>
</head>
<body>
<div class="sidebar" id="sidebar">
  <div class="brand">&#x1F48E; <span>Wiseplusgrow</span></div>
  <div class="nav-item active" onclick="showPage('dashboard',this)"><span class="icon">&#x1F4CA;</span><span class="label">&#x0E41;&#x0E1C;&#x0E07;&#x0E1A;&#x0E23;&#x0E34;&#x0E2B;&#x0E32;&#x0E23;</span></div>
  <div class="nav-item" onclick="showPage('activity',this)"><span class="icon">&#x2705;</span><span class="label">&#x0E07;&#x0E32;&#x0E19;&#x0E15;&#x0E34;&#x0E14;&#x0E15;&#x0E32;&#x0E21;</span></div>
  <div class="nav-item" onclick="showPage('customer',this)"><span class="icon">&#x1F465;</span><span class="label">&#x0E25;&#x0E39;&#x0E01;&#x0E04;&#x0E49;&#x0E32;</span></div>
  <div class="nav-item" onclick="showPage('project',this)"><span class="icon">&#x1F4C1;</span><span class="label">&#x0E42;&#x0E04;&#x0E23;&#x0E07;&#x0E01;&#x0E32;&#x0E23;</span></div>
  <div class="nav-item" onclick="showPage('lead',this)"><span class="icon">&#x1F3AF;</span><span class="label">&#x0E42;&#x0E2D;&#x0E01;&#x0E32;&#x0E2A;</span></div>
  <div class="nav-item" onclick="showPage('quotation',this)"><span class="icon">&#x1F4C4;</span><span class="label">&#x0E43;&#x0E1A;&#x0E40;&#x0E2A;&#x0E19;&#x0E2D;&#x0E23;&#x0E32;&#x0E04;&#x0E32;</span></div>
  <div class="nav-item" onclick="showPage('saleorder',this)"><span class="icon">&#x1F6D2;</span><span class="label">&#x0E43;&#x0E1A;&#x0E2A;&#x0E31;&#x0E48;&#x0E07;&#x0E02;&#x0E32;&#x0E22;</span></div>
  <div class="nav-item" onclick="showPage('forecast',this)"><span class="icon">&#x1F4C8;</span><span class="label">&#x0E04;&#x0E32;&#x0E14;&#x0E01;&#x0E32;&#x0E23;&#x0E13;&#x0E4C;</span></div>
  <div class="nav-item" onclick="showPage('report',this)"><span class="icon">&#x1F4CB;</span><span class="label">&#x0E23;&#x0E32;&#x0E22;&#x0E07;&#x0E32;&#x0E19;</span></div>
  <div class="nav-item" onclick="showPage('setting',this)"><span class="icon">&#x2699;&#xFE0F;</span><span class="label">&#x0E15;&#x0E31;&#x0E49;&#x0E07;&#x0E04;&#x0E48;&#x0E32;</span></div>
</div>
<div class="main">
  <div class="topbar">
    <h2 id="page-title">&#x0E41;&#x0E1C;&#x0E07;&#x0E1A;&#x0E23;&#x0E34;&#x0E2B;&#x0E32;&#x0E23;</h2>
    <div class="topbar-right">
      <button class="btn-primary" onclick="openModal()">+ &#x0E40;&#x0E1E;&#x0E34;&#x0E48;&#x0E21;&#x0E23;&#x0E32;&#x0E22;&#x0E01;&#x0E32;&#x0E23;</button>
      <button class="btn-outline">&#x1F464; &#x0E1C;&#x0E39;&#x0E49;&#x0E14;&#x0E39;&#x0E41;&#x0E25;&#x0E23;&#x0E30;&#x0E1A;&#x0E1A;</button>
    </div>
  </div>
  <div class="content">
    <div class="page active" id="page-dashboard"></div>
    <div class="page" id="page-activity"></div>
    <div class="page" id="page-customer"></div>
    <div class="page" id="page-project"></div>
    <div class="page" id="page-lead"></div>
    <div class="page" id="page-quotation"></div>
    <div class="page" id="page-saleorder"></div>
    <div class="page" id="page-forecast"></div>
    <div class="page" id="page-report"></div>
    <div class="page" id="page-setting"></div>
  </div>
</div>
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box">
    <h3 id="modal-title">&#x0E40;&#x0E1E;&#x0E34;&#x0E48;&#x0E21;&#x0E23;&#x0E32;&#x0E22;&#x0E01;&#x0E32;&#x0E23;</h3>
    <div id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">&#x0E22;&#x0E01;&#x0E40;&#x0E25;&#x0E34;&#x0E01;</button>
      <button class="btn-primary" onclick="saveModal()">&#x1F4BE; &#x0E1A;&#x0E31;&#x0E19;&#x0E17;&#x0E36;&#x0E01;</button>
    </div>
  </div>
</div>
<script>
var currentPage='dashboard';
var db={customers:[],activities:[],leads:[],quotations:[],saleorders:[],projects:[]};
function load(){try{var d=localStorage.getItem('wpg_crm');if(d)db=JSON.parse(d);}catch(e){}}
function save(){localStorage.setItem('wpg_crm',JSON.stringify(db));}
function showPage(page,el){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.nav-item').forEach(function(n){n.classList.remove('active');});
  var p=document.getElementById('page-'+page);
  if(p)p.classList.add('active');
  if(el)el.classList.add('active');
  currentPage=page;
  var titles={dashboard:'แผงบริหาร',activity:'งานติดตาม',customer:'ลูกค้า',project:'โครงการ',lead:'โอกาส (Pipeline)',quotation:'ใบเสนอราคา',saleorder:'ใบสั่งขาย',forecast:'คาดการณ์',report:'รายงาน',setting:'ตั้งค่า'};
  document.getElementById('page-title').textContent=titles[page]||page;
  renderPage(page);
}
function renderPage(page){
  if(page==='dashboard')renderDash();
  if(page==='customer')renderCustomers();
  if(page==='activity')renderActivities();
  if(page==='lead')renderLeads();
  if(page==='quotation')renderQuot();
  if(page==='saleorder')renderSO();
  if(page==='project')renderProj();
  if(page==='forecast')renderForecast();
  if(page==='report')renderReport();
}
function fmt(n){return Number(n||0).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtN(n){return Number(n||0).toLocaleString('th-TH');}
function el(id){return document.getElementById(id);}
function renderDash(){
  var totalSale=db.saleorders.reduce(function(a,b){return a+Number(b.amount||0);},0);
  if(el('s-cust'))el('s-cust').textContent=fmtN(db.customers.length);
  if(el('s-act'))el('s-act').textContent=fmtN(db.activities.length);
  if(el('s-sale'))el('s-sale').textContent=fmt(totalSale);
  if(el('s-so'))el('s-so').textContent=fmtN(db.saleorders.filter(function(s){return s.status==='รอส่ง';}).length);
  if(el('s-lead'))el('s-lead').textContent=fmtN(db.leads.length);
  if(el('s-quot'))el('s-quot').textContent=fmtN(db.quotations.length);
  var cp=Math.min(100,Math.round(db.customers.length/20*100));
  var lp=Math.min(100,Math.round(db.leads.length/10*100));
  var sp=Math.min(100,Math.round(totalSale/100000*100));
  if(el('g-cust'))el('g-cust').style.width=cp+'%';
  if(el('gv-cust'))el('gv-cust').textContent=db.customers.length+'/20';
  if(el('g-lead'))el('g-lead').style.width=lp+'%';
  if(el('gv-lead'))el('gv-lead').textContent=db.leads.length+'/10';
  if(el('g-sale'))el('g-sale').style.width=sp+'%';
  if(el('gv-sale'))el('gv-sale').textContent=fmtN(totalSale)+'/100,000';
  var tbody=el('dash-act-table');
  if(tbody){
    if(db.activities.length===0){tbody.innerHTML='<tr><td colspan="5" class="empty-row">ยังไม่มีกิจกรรม</td></tr>';}
    else{tbody.innerHTML=db.activities.slice(-5).reverse().map(function(a){return '<tr><td>'+a.customer+'</td><td>'+a.type+'</td><td>'+a.date+'</td><td><span class="tag tag-blue">'+a.status+'</span></td><td>'+a.owner+'</td></tr>';}).join('');}
  }
}
function renderCustomers(){
  var tbody=el('cust-table');if(!tbody)return;
  if(db.customers.length===0){tbody.innerHTML='<tr><td colspan="6" class="empty-row">ยังไม่มีลูกค้า</td></tr>';return;}
  tbody.innerHTML=db.customers.map(function(c){return '<tr><td>'+c.name+'</td><td>'+c.company+'</td><td>'+c.phone+'</td><td>'+c.email+'</td><td>'+c.type+'</td><td><span class="tag tag-green">'+c.status+'</span></td></tr>';}).join('');
}
function renderActivities(){
  var tbody=el('act-table');if(!tbody)return;
  if(db.activities.length===0){tbody.innerHTML='<tr><td colspan="6" class="empty-row">ยังไม่มีกิจกรรม</td></tr>';return;}
  tbody.innerHTML=db.activities.map(function(a){return '<tr><td>'+a.customer+'</td><td>'+a.type+'</td><td>'+a.detail+'</td><td>'+a.date+'</td><td><span class="tag tag-blue">'+a.status+'</span></td><td>'+a.owner+'</td></tr>';}).join('');
}
function renderLeads(){
  var statuses=['โอกาสใหม่','ติดต่อแล้ว','เสนอราคา','ปิดการขาย'];
  var ids=['new','contacted','proposed','won'];
  statuses.forEach(function(st,i){
    var filtered=db.leads.filter(function(l){return l.stage===st;});
    var cnt=el('cnt-'+ids[i]);var col=el('pipe-'+ids[i]);
    if(cnt)cnt.textContent=filtered.length;
    if(col){col.innerHTML=filtered.length===0?'<div style="color:#b0bec5;font-size:12px;text-align:center;padding:10px">ไม่มีรายการ</div>':filtered.map(function(l){return '<div class="pipe-card"><div class="pname">'+l.customer+'</div><div class="pmeta">฿'+fmtN(l.value)+' · '+l.date+'</div></div>';}).join('');}
  });
}
function renderQuot(){
  var tbody=el('quot-table');if(!tbody)return;
  if(db.quotations.length===0){tbody.innerHTML='<tr><td colspan="5" class="empty-row">ยังไม่มีใบเสนอราคา</td></tr>';return;}
  tbody.innerHTML=db.quotations.map(function(q,i){return '<tr><td>QT-'+String(i+1).padStart(4,'0')+'</td><td>'+q.customer+'</td><td>฿'+fmt(q.amount)+'</td><td>'+q.date+'</td><td><span class="tag tag-orange">'+q.status+'</span></td></tr>';}).join('');
}
function renderSO(){
  var tbody=el('so-table');if(!tbody)return;
  if(db.saleorders.length===0){tbody.innerHTML='<tr><td colspan="5" class="empty-row">ยังไม่มีใบสั่งขาย</td></tr>';return;}
  tbody.innerHTML=db.saleorders.map(function(s,i){return '<tr><td>SO-'+String(i+1).padStart(4,'0')+'</td><td>'+s.customer+'</td><td>฿'+fmt(s.amount)+'</td><td>'+s.date+'</td><td><span class="tag '+(s.status==='เสร็จสิ้น'?'tag-green':'tag-orange')+'">'+s.status+'</span></td></tr>';}).join('');
}
function renderProj(){
  var tbody=el('proj-table');if(!tbody)return;
  if(db.projects.length===0){tbody.innerHTML='<tr><td colspan="6" class="empty-row">ยังไม่มีโครงการ</td></tr>';return;}
  tbody.innerHTML=db.projects.map(function(p){return '<tr><td>'+p.name+'</td><td>'+p.customer+'</td><td>฿'+fmt(p.budget)+'</td><td>'+p.start+'</td><td>'+p.end+'</td><td><span class="tag tag-blue">'+p.status+'</span></td></tr>';}).join('');
}
function renderForecast(){
  var total=db.saleorders.reduce(function(a,b){return a+Number(b.amount||0);},0);
  if(el('fc-month'))el('fc-month').textContent='฿'+fmt(total);
  if(el('fc-q'))el('fc-q').textContent='฿'+fmt(total);
  if(el('fc-y'))el('fc-y').textContent='฿'+fmt(total);
  var tbody=el('fc-table');
  if(tbody){if(db.leads.length===0){tbody.innerHTML='<tr><td colspan="4" class="empty-row">ยังไม่มีข้อมูล</td></tr>';}else{tbody.innerHTML=db.leads.map(function(l){return '<tr><td>'+l.customer+'</td><td>฿'+fmtN(l.value)+'</td><td>'+l.probability+'%</td><td>'+l.date+'</td></tr>';}).join('');}}
}
function renderReport(){
  var totalSale=db.saleorders.reduce(function(a,b){return a+Number(b.amount||0);},0);
  if(el('r-cust'))el('r-cust').textContent=db.customers.length;
  if(el('r-sale'))el('r-sale').textContent='฿'+fmt(totalSale);
  if(el('r-quot'))el('r-quot').textContent=db.quotations.length;
  if(el('r-so'))el('r-so').textContent=db.saleorders.length;
  if(el('r-lead'))el('r-lead').textContent=db.leads.length;
  if(el('r-act'))el('r-act').textContent=db.activities.length;
}
var modalForms={
  customer:{title:'เพิ่มลูกค้าใหม่',fields:[{n:'name',l:'ชื่อลูกค้า',t:'text'},{n:'company',l:'บริษัท',t:'text'},{n:'phone',l:'เบอร์โทร',t:'text'},{n:'email',l:'อีเมล',t:'email'},{n:'type',l:'ประเภท',t:'select',opts:['บุคคล','นิติบุคคล','ตัวแทน']},{n:'status',l:'สถานะ',t:'select',opts:['ใหม่','กำลังดูแล','ปิดแล้ว']}]},
  activity:{title:'เพิ่มกิจกรรม',fields:[{n:'customer',l:'ลูกค้า',t:'text'},{n:'type',l:'ประเภท',t:'select',opts:['โทรหา','นัดหมาย','ส่งอีเมล','เยี่ยมชม']},{n:'detail',l:'รายละเอียด',t:'textarea'},{n:'date',l:'วันที่',t:'date'},{n:'status',l:'สถานะ',t:'select',opts:['กำหนดการ','เสร็จสิ้น','ยกเลิก']},{n:'owner',l:'ผู้รับผิดชอบ',t:'text'}]},

function openModal(){
  var page=currentPage==='dashboard'?'customer':currentPage;
  var form=modalForms[page]||modalForms['customer'];
  el('modal-title').textContent=form.title;
  el('modal-body').innerHTML=form.fields.map(function(f){
    var input;
    if(f.t==='select'){input='<select name="'+f.n+'">'+f.opts.map(function(o){return '<option>'+o+'</option>';}).join('')+'</select>';}
    else if(f.t==='textarea'){input='<textarea name="'+f.n+'"></textarea>';}
    else{input='<input type="'+f.t+'" name="'+f.n+'">';}
    return '<div class="form-group"><label>'+f.l+'</label>'+input+'</div>';
  }).join('');
  el('modal-overlay').classList.add('open');
}
function closeModal(){el('modal-overlay').classList.remove('open');}
function saveModal(){
  var page=currentPage==='dashboard'?'customer':currentPage;
  var inputs=el('modal-body').querySelectorAll('input,select,textarea');
  var data={};inputs.forEach(function(inp){if(inp.name)data[inp.name]=inp.value;});
  var map={customer:'customers',activity:'activities',lead:'leads',quotation:'quotations',saleorder:'saleorders',project:'projects'};
  var key=map[page];if(key)db[key].push(data);
  save();closeModal();renderPage(page);
  if(page!=='dashboard')renderDash();
}
