<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wiseplusgrow CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Sarabun',sans-serif;background:#f4f5f7;display:flex;height:100vh;overflow:hidden;font-size:14px;}

/* SIDEBAR */
.sidebar{width:58px;min-width:58px;background:#1a2332;display:flex;flex-direction:column;align-items:center;padding:0;transition:width .25s;overflow:hidden;z-index:200;flex-shrink:0;}
.sidebar:hover{width:200px;}
.sidebar-logo{display:flex;align-items:center;justify-content:center;height:52px;width:100%;background:#141d2b;border-bottom:1px solid #243044;flex-shrink:0;}
.sidebar-logo .logo-icon{font-size:20px;min-width:34px;text-align:center;}
.sidebar-logo .logo-text{opacity:0;transition:opacity .2s;font-size:14px;font-weight:700;color:#fff;white-space:nowrap;}
.sidebar:hover .logo-text{opacity:1;}
.nav-group{width:100%;padding:8px 0;}
.nav-item{display:flex;align-items:center;gap:0;width:100%;height:46px;cursor:pointer;color:#8fa3b8;transition:all .18s;white-space:nowrap;overflow:hidden;position:relative;}
.nav-item:hover{background:#243044;color:#fff;}
.nav-item.active{background:#243044;color:#f0c040;}
.nav-item.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:#f0c040;}
.nav-item .ni{font-size:17px;min-width:58px;text-align:center;flex-shrink:0;}
.nav-item .nl{opacity:0;transition:opacity .15s;font-size:13px;font-weight:500;}
.sidebar:hover .nav-item .nl{opacity:1;}
.nav-label{font-size:10px;color:#4a6278;padding:8px 0 4px 0;text-align:center;width:100%;letter-spacing:.5px;opacity:0;white-space:nowrap;}
.sidebar:hover .nav-label{opacity:1;}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}

/* TOPBAR */
.topbar{background:#fff;height:52px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid #f0c040;flex-shrink:0;padding:0 20px;}
.topbar-left{display:flex;align-items:center;gap:12px;}
.topbar-left h2{font-size:17px;font-weight:700;color:#1a2332;}
.topbar-filters{display:flex;gap:8px;}
.filter-btn{background:#f4f5f7;border:1px solid #dde2ea;padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-family:'Sarabun',sans-serif;color:#4a5568;}
.filter-btn.active{background:#1a2332;color:#fff;border-color:#1a2332;}
.topbar-right{display:flex;gap:8px;align-items:center;}
.btn-add{background:#1a2332;color:#fff;border:none;padding:7px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-family:'Sarabun',sans-serif;font-weight:600;}
.btn-add:hover{background:#243044;}
.user-badge{display:flex;align-items:center;gap:8px;font-size:13px;color:#4a5568;}
.user-avatar{width:32px;height:32px;border-radius:50%;background:#f0c040;display:flex;align-items:center;justify-content:center;font-weight:700;color:#1a2332;font-size:13px;}

/* DATE BAR */
.date-bar{background:#fff;border-bottom:1px solid #e8ecf0;padding:6px 20px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.date-range{font-size:12px;color:#6b7280;font-weight:500;}
.period-btns{display:flex;gap:4px;margin-left:auto;}
.period-btn{padding:4px 12px;border-radius:5px;font-size:12px;cursor:pointer;border:1px solid #dde2ea;background:#fff;font-family:'Sarabun',sans-serif;color:#4a5568;}
.period-btn.active{background:#1a2332;color:#fff;border-color:#1a2332;}

/* CONTENT SCROLL */
.content{flex:1;overflow-y:auto;padding:16px 20px;}

/* PAGES */
.page{display:none;}
.page.active{display:block;}

/* STAT CARDS ROW - JUBILI STYLE */
.kpi-row{display:grid;grid-template-columns:repeat(6,1fr);gap:0;background:#fff;border-radius:8px;overflow:hidden;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.kpi-card{padding:14px 16px;border-right:1px solid #f0f2f5;position:relative;}
.kpi-card:last-child{border-right:none;}
.kpi-label{font-size:11px;color:#8fa3b8;font-weight:600;letter-spacing:.3px;margin-bottom:4px;}
.kpi-unit{font-size:10px;color:#8fa3b8;position:absolute;top:14px;right:10px;}
.kpi-num{font-size:24px;font-weight:700;color:#1a2332;line-height:1.1;}
.kpi-num span{font-size:13px;color:#8fa3b8;font-weight:400;}
.kpi-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:600;margin-top:8px;}
.kpi-badge.red{background:#ffe8e8;color:#dc2626;}
.kpi-badge.green{background:#e8f9f0;color:#16a34a;}
.kpi-badge.blue{background:#e8f0fb;color:#2563eb;}
.kpi-badge.yellow{background:#fef9e7;color:#d97706;}
.kpi-badge.gray{background:#f4f5f7;color:#6b7280;}

/* SECTION GRID */
.dash-row2{display:grid;grid-template-columns:340px 1fr;gap:16px;margin-bottom:16px;}

/* GOAL SECTION - Jubili style */
.card{background:#fff;border-radius:8px;padding:18px;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.card-header{display:flex;align-items:center;gap:8px;margin-bottom:16px;font-size:14px;font-weight:700;color:#1a2332;}
.card-header .ch-icon{font-size:16px;}
.goal-item{margin-bottom:16px;}
.goal-name{font-size:13px;color:#4a5568;margin-bottom:4px;}
.goal-pct{font-size:22px;font-weight:700;color:#16a34a;line-height:1;}
.goal-sub{font-size:11px;color:#8fa3b8;margin-top:2px;}
.goal-bar-bg{height:6px;background:#f0f2f5;border-radius:3px;margin-top:6px;overflow:hidden;}
.goal-bar-fill{height:100%;border-radius:3px;background:#16a34a;transition:width .5s;}

/* STATUS SECTION */
.status-grid{display:grid;grid-template-columns:200px 1fr;gap:16px;align-items:start;}
.donut-wrap{position:relative;width:180px;height:180px;margin:0 auto;}
.donut-wrap svg{transform:rotate(-90deg);}
.donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.donut-center .dc-num{font-size:20px;font-weight:700;color:#1a2332;}
.donut-center .dc-lbl{font-size:11px;color:#8fa3b8;}
.status-legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:12px;}
.leg-item{display:flex;align-items:center;gap:6px;font-size:12px;color:#4a5568;}
.leg-dot{width:10px;height:10px;border-radius:2px;}

/* STATUS TABLE */
.status-table{font-size:12px;}
.status-table table{width:100%;border-collapse:collapse;}
.status-table th{text-align:center;padding:8px 6px;color:#8fa3b8;font-weight:600;font-size:11px;border-bottom:2px solid #f0f2f5;}
.status-table th:first-child{text-align:left;}
.status-table td{text-align:center;padding:8px 6px;border-bottom:1px solid #f9fafb;color:#374151;}
.status-table td:first-child{text-align:left;font-weight:500;}
.status-table tr.total-row td{background:#f4f5f7;font-weight:700;}
.status-table .win-cell{color:#16a34a;font-weight:700;}

/* BOTTOM ROW */
.dash-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px;}

/* FUNNEL */
.funnel-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;padding:8px 0;}
.funnel-bar{display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:600;border-radius:4px;transition:width .3s;}

/* LINE CHART SIMPLE */
.line-chart{height:120px;position:relative;margin-top:8px;}
.lc-svg{width:100%;height:100%;}

/* ACTIVITY LIST */
.act-list{display:flex;flex-direction:column;gap:8px;}
.act-item{display:flex;gap:10px;align-items:flex-start;padding:8px;border-radius:6px;background:#f9fafb;}
.act-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.act-text{flex:1;}
.act-title{font-size:12px;font-weight:600;color:#1a2332;}
.act-meta{font-size:11px;color:#8fa3b8;margin-top:2px;}

/* PAGE TITLE BAR */
.page-title-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.page-title-text{font-size:16px;font-weight:700;color:#1a2332;}

/* TABLE CARD */
.tcard{background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.07);overflow:hidden;}
.tcard-header{padding:14px 16px;border-bottom:1px solid #f0f2f5;font-weight:700;font-size:14px;color:#1a2332;display:flex;align-items:center;gap:8px;}
table.main-table{width:100%;border-collapse:collapse;font-size:13px;}
table.main-table th{text-align:left;padding:10px 14px;color:#8fa3b8;font-weight:600;border-bottom:1px solid #f0f2f5;font-size:12px;background:#fafbfc;}
table.main-table td{padding:11px 14px;border-bottom:1px solid #f9fafb;color:#374151;}
table.main-table tr:last-child td{border-bottom:none;}
table.main-table tr:hover td{background:#f9fafb;}
.empty-row{text-align:center;color:#b0bec5;padding:28px;font-size:13px;}

/* TAG */
.tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;}
.tag-green{background:#e8f9f0;color:#16a34a;}
.tag-blue{background:#e8f0fb;color:#2563eb;}
.tag-yellow{background:#fef9e7;color:#d97706;}
.tag-red{background:#ffe8e8;color:#dc2626;}
.tag-gray{background:#f4f5f7;color:#6b7280;}

/* PIPELINE */
.pipeline{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.pipe-col{background:#f9fafb;border-radius:8px;padding:12px;border-top:3px solid #1a2332;}
.pipe-col.c0{border-color:#f0c040;}
.pipe-col.c1{border-color:#3b82f6;}
.pipe-col.c2{border-color:#f97316;}
.pipe-col.c3{border-color:#22c55e;}
.pipe-col-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.pipe-col-title{font-size:12px;font-weight:700;color:#4a5568;}
.pipe-count{background:#1a2332;color:#fff;border-radius:20px;padding:1px 8px;font-size:11px;font-weight:700;}
.pipe-card{background:#fff;border-radius:6px;padding:10px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.07);}
.pipe-card .pname{font-size:13px;font-weight:600;color:#1a2332;}
.pipe-card .pmeta{font-size:11px;color:#8fa3b8;margin-top:3px;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal-box{background:#fff;border-radius:10px;width:480px;max-width:95vw;max-height:85vh;overflow:auto;}
.modal-header{padding:18px 22px 14px;border-bottom:1px solid #f0f2f5;font-size:15px;font-weight:700;color:#1a2332;display:flex;justify-content:space-between;align-items:center;}
.modal-close{cursor:pointer;font-size:18px;color:#8fa3b8;}
.modal-body{padding:18px 22px;}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:12px;color:#4a5568;font-weight:600;margin-bottom:5px;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 11px;border:1px solid #dde2ea;border-radius:6px;font-family:'Sarabun',sans-serif;font-size:13px;outline:none;color:#1a2332;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#f0c040;box-shadow:0 0 0 3px rgba(240,192,64,.15);}
.form-group textarea{resize:vertical;min-height:75px;}
.modal-footer{padding:14px 22px;border-top:1px solid #f0f2f5;display:flex;gap:8px;justify-content:flex-end;}
.btn-save{background:#1a2332;color:#fff;border:none;padding:8px 20px;border-radius:6px;cursor:pointer;font-family:'Sarabun',sans-serif;font-size:13px;font-weight:600;}
.btn-save:hover{background:#243044;}
.btn-cancel{background:#f4f5f7;color:#4a5568;border:1px solid #dde2ea;padding:8px 16px;border-radius:6px;cursor:pointer;font-family:'Sarabun',sans-serif;font-size:13px;}

/* SETTING */
.setting-section{background:#fff;border-radius:8px;padding:20px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.setting-section h3{font-size:14px;font-weight:700;margin-bottom:14px;color:#1a2332;}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid #f9fafb;}
.setting-row:last-child{border-bottom:none;}
.setting-label{font-size:13px;color:#374151;}
.setting-val{font-size:13px;color:#8fa3b8;}

/* FORECAST */
.fc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:16px;}
.fc-card{background:#fff;border-radius:8px;padding:18px;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.fc-card h3{font-size:12px;font-weight:700;color:#8fa3b8;margin-bottom:8px;letter-spacing:.3px;}
.fc-card .fc-num{font-size:22px;font-weight:700;color:#1a2332;}
.fc-card .fc-sub{font-size:11px;color:#8fa3b8;margin-top:4px;}
</style>
</head>

<script>
var currentPage='dashboard';
var db={customers:[],activities:[],leads:[],quotations:[],saleorders:[],projects:[]};
function load(){try{var d=localStorage.getItem('wpg_crm');if(d)db=JSON.parse(d);}catch(e){}}
function save(){localStorage.setItem('wpg_crm',JSON.stringify(db));}
function fmt(n){return Number(n||0).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtN(n){return Number(n||0).toLocaleString('th-TH');}
function el(id){return document.getElementById(id);}
function setPeriod(p,btn){
  document.querySelectorAll('.period-btn').forEach(function(b){b.classList.remove('active');});
  if(btn)btn.classList.add('active');
  renderDash();
}
function showPage(page,navEl){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.nav-item').forEach(function(n){n.classList.remove('active');});
  var p=document.getElementById('page-'+page);
  if(p)p.classList.add('active');
  if(navEl)navEl.classList.add('active');
  currentPage=page;

function kpiCard(label,unit,num,sub,color,badge){
  return '<div class="kpi-card">' +
    (unit?'<div class="kpi-unit">'+unit+'</div>':'')+
    '<div class="kpi-label">'+label+'</div>' +
    '<div class="kpi-num">'+(unit==='THB'?fmt(num):fmtN(num))+'</div>' +
    '<div class="kpi-badge '+color+'">'+badge+'</div>' +
  '</div>';
}
function goalRow(name,pct,sub){
  return '<div class="goal-item">' +
    '<div class="goal-name">'+name+'</div>' +
    '<div class="goal-pct">'+(pct||0).toFixed(2)+'%</div>' +
    '<div class="goal-sub">'+sub+'</div>' +
    '<div class="goal-bar-bg"><div class="goal-bar-fill" style="width:'+pct+'%"></div></div>' +
  '</div>';
}
function donutSVG(total,a,b,c,d){
  var r=70,cx=90,cy=90,circ=2*Math.PI*r;
  var vals=[a,b,c,d];
  var colors=['#f0c040','#3b82f6','#22c55e','#ef4444'];
  if(total===0){vals=[1,1,1,1];total=4;}
  var off=0;
  var segs='';
  vals.forEach(function(v,i){
    var pct=v/total;
    var dash=pct*circ;
    segs+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+colors[i]+'" stroke-width="22" stroke-dasharray="'+dash+' '+(circ-dash)+'" stroke-dashoffset="'+(-off*circ/total*total)+'"/>';
    off+=v;
  });
  return '<div class="donut-wrap"><svg width="180" height="180" viewBox="0 0 180 180" style="transform:rotate(-90deg)"><circle cx="90" cy="90" r="70" fill="none" stroke="#f0f2f5" stroke-width="22"/>'+segs+'</svg><div class="donut-center"><div class="dc-num">'+total+'</div><div class="dc-lbl">&#x0E17;&#x0E31;&#x0E49;&#x0E07;&#x0E2B;&#x0E21;&#x0E14;</div></div></div>';
}
function statusTableRows(){
  if(db.customers.length===0)return '<tr><td colspan="5" class="empty-row">-</td></tr>';
  return db.customers.slice(0,3).map(function(c){
    var cAct=db.activities.filter(function(a){return a.customer===c.name;}).length;
    var cNew=db.leads.filter(function(l){return l.customer===c.name&&l.stage==='&#x0E42;&#x0E2D;&#x0E01;&#x0E32;&#x0E2A;&#x0E43;&#x0E2B;&#x0E21;&#x0E48;';}).length;
    var cProp=db.leads.filter(function(l){return l.customer===c.name&&l.stage==='&#x0E40;&#x0E2A;&#x0E19;&#x0E2D;&#x0E23;&#x0E32;&#x0E04;&#x0E32;';}).length;
    var cWin=db.leads.filter(function(l){return l.customer===c.name&&l.stage==='&#x0E1B;&#x0E34;&#x0E14;&#x0E01;&#x0E32;&#x0E23;&#x0E02;&#x0E32;&#x0E22;';}).length;
    return '<tr><td>'+c.name+'</td><td>'+cAct+'</td><td>'+cNew+'</td><td>'+cProp+'</td><td class="win-cell">'+cWin+'</td></tr>';
  }).join('');
}
function funnelHTML(){
  var stages=[
    {label:'&#x0E42;&#x0E2D;&#x0E01;&#x0E32;&#x0E2A;&#x0E43;&#x0E2B;&#x0E21;&#x0E48;',val:db.leads.filter(function(l){return l.stage==='&#x0E42;&#x0E2D;&#x0E01;&#x0E32;&#x0E2A;&#x0E43;&#x0E2B;&#x0E21;&#x0E48;';}).length,color:'#f0c040'},
    {label:'&#x0E15;&#x0E34;&#x0E14;&#x0E15;&#x0E48;&#x0E2D;&#x0E41;&#x0E25;&#x0E49;&#x0E27;',val:db.leads.filter(function(l){return l.stage==='&#x0E15;&#x0E34;&#x0E14;&#x0E15;&#x0E48;&#x0E2D;&#x0E41;&#x0E25;&#x0E49;&#x0E27;';}).length,color:'#3b82f6'},
    {label:'&#x0E40;&#x0E2A;&#x0E19;&#x0E2D;&#x0E23;&#x0E32;&#x0E04;&#x0E32;',val:db.leads.filter(function(l){return l.stage==='&#x0E40;&#x0E2A;&#x0E19;&#x0E2D;&#x0E23;&#x0E32;&#x0E04;&#x0E32;';}).length,color:'#f97316'},
    {label:'&#x0E1B;&#x0E34;&#x0E14;&#x0E01;&#x0E32;&#x0E23;&#x0E02;&#x0E32;&#x0E22;',val:db.leads.filter(function(l){return l.stage==='&#x0E1B;&#x0E34;&#x0E14;&#x0E01;&#x0E32;&#x0E23;&#x0E02;&#x0E32;&#x0E22;';}).length,color:'#22c55e'}
  ];
  var maxV=Math.max.apply(null,stages.map(function(s){return s.val;}));
  if(maxV===0)maxV=1;
  return '<div class="funnel-wrap">'+stages.map(function(s,i){
    var w=Math.max(30,Math.round((1-(i*0.15))*100))+'%';
    var pct=Math.round(s.val/maxV*100);
    return '<div style="width:'+w+';background:'+s.color+';height:36px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:600;border-radius:4px;">'+s.label+' '+s.val+'</div>';
  }).join('')+'</div>';
}

// Initialize application
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const pg = document.getElementById(id);
  if (pg) pg.classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => {
    n.classList.remove('active');
    if (n.dataset.page === id) n.classList.add('active');
  });
  if (id === 'dashboard') renderDash();
}

function init() {
  // Render dashboard on load
  renderDash();
  
  // Sidebar navigation
  document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', function() {
      showPage(this.dataset.page);
    });
  });
  
  // Date filter buttons
  document.querySelectorAll('.date-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.date-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      renderDash();
    });
  });
  
  // Customer form
  const custForm = document.getElementById('custForm');
  if (custForm) custForm.addEventListener('submit', function(e) {
    e.preventDefault();
    const name = document.getElementById('custName').value;
    const phone = document.getElementById('custPhone').value;
    const email = document.getElementById('custEmail').value;
    const type = document.getElementById('custType').value;
    db.customers.push({ id: Date.now(), name, phone, email, type });
    saveDB();
    renderCustomers();
    document.getElementById('customerModal').style.display = 'none';
    custForm.reset();
  });
  
  renderCustomers();
  renderActivities();
  renderLeads();
  renderQuotes();
  renderOrders();
}

function renderCustomers() {
  const tbody = document.getElementById('custTableBody');
  if (!tbody) return;
  tbody.innerHTML = db.customers.map((c,i) => `
    <tr>
      <td>${i+1}</td>
      <td>${c.name}</td>
      <td>${c.phone || '-'}</td>
      <td>${c.email || '-'}</td>
      <td><span class="badge" style="background:#e8f5e9;color:#2e7d32;">${c.type || 'ลูกค้า'}</span></td>
      <td><button class="btn btn-sm" onclick="deleteCustomer(${c.id})">ลบ</button></td>
    </tr>
  `).join('');
}

function deleteCustomer(id) {
  db.customers = db.customers.filter(c => c.id !== id);
  saveDB();
  renderCustomers();
  renderDash();
}

function renderActivities() {
  const tbody = document.getElementById('actTableBody');
  if (!tbody) return;
  tbody.innerHTML = db.activities.map((a,i) => `
    <tr>
      <td>${i+1}</td>
      <td>${a.date}</td>
      <td>${a.customer}</td>
      <td>${a.type}</td>
      <td>${a.owner}</td>
      <td>${a.note || '-'}</td>
    </tr>
  `).join('');
}

function renderLeads() {
  const cont = document.getElementById('leadsContainer');
  if (!cont) return;
  const stages = ['ติดต่อ','นำเสนอ','เจรจา','ปิดการขาย'];
  cont.innerHTML = stages.map(stage => {

      </div>`).join('')}
    </div>`;
  }).join('');
}

}

function renderOrders() {
  const tbody = document.getElementById('orderTableBody');
  if (!tbody) return;
  tbody.innerHTML = db.orders.map((o,i) => `
    <tr>
      <td>${i+1}</td>
      <td>${o.code}</td>
      <td>${o.customer}</td>
      <td>฿${o.amount.toLocaleString()}</td>
      <td>${o.date}</td>
      <td><span class="badge" style="background:#e8f5e9;color:#2e7d32;">${o.status}</span></td>
    </tr>
  `).join('');
}

// Start app
init();
</script>
</body>
